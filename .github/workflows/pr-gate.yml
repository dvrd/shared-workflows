# PR Gate — Only notify board when EVERYTHING is green
#
# ✅ CI passes + preview healthy → Telegram: "PR #X ready to merge" + preview URL
# ❌ Anything fails             → silence (agent fixes on next heartbeat)
#
# Caller workflow must filter on workflow_run.conclusion == 'success' before calling this.
# Required secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

name: PR Gate

on:
  workflow_call:
    inputs:
      head_ref:
        description: "The head branch ref (github.head_ref from the calling workflow)"
        required: true
        type: string
      product_domain:
        description: "Domain of the product (e.g. ariel.donostia.ai)"
        required: true
        type: string
      health_path:
        description: "Health check path (default: /health)"
        required: false
        type: string
        default: /health
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  gate:
    runs-on: [self-hosted, Linux]
    permissions:
      pull-requests: read
    steps:
      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const head_branch = '${{ inputs.head_ref }}';
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${head_branch}`,
              state: 'open'
            });
            if (prs.data.length === 0) {
              core.setOutput('found', 'false');
              return;
            }
            const pr = prs.data[0];
            core.setOutput('found', 'true');
            core.setOutput('number', String(pr.number));
            core.setOutput('title', pr.title);
            core.setOutput('url', pr.html_url);
            core.setOutput('branch', pr.head.ref);

      - name: Wait for Coolify preview deploy
        if: steps.pr.outputs.found == 'true'
        id: preview
        run: |
          PR_NUM="${{ steps.pr.outputs.number }}"
          PREVIEW_URL="https://${PR_NUM}.${{ inputs.product_domain }}${{ inputs.health_path }}"
          echo "Waiting for preview at ${PREVIEW_URL}..."

          # Poll for up to 5 minutes (Coolify builds take time)
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 "${PREVIEW_URL}" 2>/dev/null || echo "000")
            echo "  Attempt ${i}/30: ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "healthy=true" >> $GITHUB_OUTPUT
              echo "preview_url=https://${PR_NUM}.${{ inputs.product_domain }}" >> $GITHUB_OUTPUT
              exit 0
            fi
            sleep 10
          done

          echo "Preview not healthy after 5 minutes"
          echo "healthy=false" >> $GITHUB_OUTPUT
          exit 1

      - name: "✅ All green → notify board"
        if: >
          steps.pr.outputs.found == 'true' &&
          steps.preview.outputs.healthy == 'true'
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_URL: ${{ steps.pr.outputs.url }}
          PREVIEW_URL: ${{ steps.preview.outputs.preview_url }}
        run: |
          TEXT="✅ *PR #${PR_NUMBER} ready to merge*
          *Repo:* ${{ github.repository }}
          *Title:* ${PR_TITLE}

          CI passed + preview deployment healthy.
          🔗 Review: ${PR_URL}
          🌐 Preview: ${PREVIEW_URL}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${TEXT}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true"
