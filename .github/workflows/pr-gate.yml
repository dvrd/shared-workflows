# PR Gate — Only notify board when EVERYTHING is green
#
# ✅ CI passes + preview healthy → Telegram: "PR #X ready to merge" + preview URL
# ❌ Preview timeout            → job fails (red check), no Telegram notification sent
#
# Caller workflow must filter on workflow_run.conclusion == 'success' before calling this.
# Required secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

name: PR Gate

on:
  workflow_call:
    inputs:
      head_ref:
        description: "The head branch ref (github.head_ref from the calling workflow)"
        required: true
        type: string
      product_domain:
        description: "Domain of the product (e.g. ariel.donostia.ai)"
        required: true
        type: string
      health_path:
        description: "Health check path (default: /health)"
        required: false
        type: string
        default: /health
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  gate:
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    permissions:
      pull-requests: read
    steps:
      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        env:
          HEAD_REF: ${{ inputs.head_ref }}
        with:
          script: |
            const head_branch = process.env.HEAD_REF;
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${head_branch}`,
              state: 'open'
            });
            if (prs.data.length === 0) {
              core.setOutput('found', 'false');
              return;
            }
            const pr = prs.data[0];
            core.setOutput('found', 'true');
            core.setOutput('number', String(pr.number));
            core.setOutput('title', pr.title);
            core.setOutput('url', pr.html_url);
            core.setOutput('branch', pr.head.ref);

      - name: Wait for Coolify preview deploy
        if: steps.pr.outputs.found == 'true'
        id: preview
        env:
          PR_NUM: ${{ steps.pr.outputs.number }}
          PRODUCT_DOMAIN: ${{ inputs.product_domain }}
          HEALTH_PATH: ${{ inputs.health_path }}
        run: |
          if [[ ! "$PRODUCT_DOMAIN" =~ ^[a-zA-Z0-9._-]+\.[a-zA-Z]{2,}$ ]]; then
            echo "::error::Invalid product_domain input: ${PRODUCT_DOMAIN}"
            exit 1
          fi
          if [[ ! "$HEALTH_PATH" =~ ^/[a-zA-Z0-9/_-]*$ ]]; then
            echo "::error::Invalid health_path input: ${HEALTH_PATH}"
            exit 1
          fi
          PREVIEW_URL="https://${PR_NUM}.${PRODUCT_DOMAIN}${HEALTH_PATH}"
          echo "Waiting for preview at ${PREVIEW_URL}..."

          # Poll for up to 5 minutes (Coolify builds take time)
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 5 --max-time 10 "${PREVIEW_URL}" 2>/dev/null)
            echo "  Attempt ${i}/30: ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "healthy=true" >> $GITHUB_OUTPUT
              echo "preview_url=https://${PR_NUM}.${PRODUCT_DOMAIN}" >> $GITHUB_OUTPUT
              exit 0
            fi
            sleep 10
          done

          echo "::error::Preview at ${PREVIEW_URL} did not return 200 after 5 minutes"
          exit 1

      - name: "✅ All green → notify board"
        if: >
          steps.pr.outputs.found == 'true' &&
          steps.preview.outputs.healthy == 'true'
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_URL: ${{ steps.pr.outputs.url }}
          PREVIEW_URL: ${{ steps.preview.outputs.preview_url }}
          REPO: ${{ github.repository }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TEXT="✅ <b>PR #${PR_NUMBER} ready to merge</b>
<b>Repo:</b> ${REPO}
<b>Title:</b> ${PR_TITLE}

CI passed + preview deployment healthy.
🔗 Review: ${PR_URL}
🌐 Preview: ${PREVIEW_URL}"

          RESPONSE=$(curl -s --connect-timeout 10 --max-time 15 -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true")
          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "Telegram notification sent."
          else
            echo "::warning::Telegram notification failed"
          fi
