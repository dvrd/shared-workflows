name: Check Branch Name

on:
  workflow_call:
    inputs:
      branch_ref:
        description: "Branch name to validate. Defaults to github.head_ref if not provided."
        required: false
        type: string
        default: ""

jobs:
  check-branch:
    runs-on: [self-hosted, Linux]
    steps:
      - name: Check branch name format
        env:
          BRANCH_REF_INPUT: ${{ inputs.branch_ref }}
          HEAD_REF_DEFAULT: ${{ github.head_ref }}
        shell: bash
        run: |
          BRANCH="${BRANCH_REF_INPUT}"
          if [ -z "$BRANCH" ]; then
            BRANCH="${HEAD_REF_DEFAULT}"
          fi
          PATTERN="^(feat|fix|chore|refactor|docs|test|style|ci|perf|build|revert|hotfix)/[a-z0-9.-]+-[0-9]+$"
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "❌ Branch name '$BRANCH' does not follow the required format."
            echo "Required: <type>/<repo>-<issue-number>"
            echo "Example: feat/onlead-123, fix/newt-42, chore/hrvst-7"
            echo "Valid types: feat, fix, chore, refactor, docs, test, style, ci, perf, build, revert, hotfix"
            exit 1
          fi
          echo "✅ Branch name '$BRANCH' is valid."
