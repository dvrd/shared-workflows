name: Notify PR needs review

on:
  workflow_call:
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  notify:
    runs-on: [self-hosted, Linux]
    permissions: {}
    if: ${{ github.event.pull_request.draft == false }}
    steps:
      - name: Send Telegram notification
        env:
          REPO: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Escape HTML special characters in user-controlled fields
          SAFE_TITLE=$(printf '%s' "$PR_TITLE" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          SAFE_AUTHOR=$(printf '%s' "$AUTHOR" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          SAFE_REPO=$(printf '%s' "$REPO" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          TEXT="🔔 <b>PR needs your approval</b>

<b>Repo:</b> ${SAFE_REPO}
<b>Author:</b> ${SAFE_AUTHOR}
<b>Title:</b> ${SAFE_TITLE}

👉 ${PR_URL}"
          RESPONSE=$(curl -s --connect-timeout 10 --max-time 15 -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true") || true
          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "Telegram notification sent."
          else
            echo "::warning::Telegram notification failed"
          fi
